# Smithery configuration file: https://smithery.ai/docs/build/project-config

startCommand:
  type: stdio
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({
      command: 'node',
      args: ['dist/server.js'],
      env: {
        CLADO_API_KEY: config.cladoApiKey
      }
    })
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - cladoApiKey
    properties:
      cladoApiKey:
        type: string
        description: Your Clado API key for authenticating with the Clado MCP server.
  exampleConfig:
    cladoApiKey: sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
